name: Android Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libclang-dev

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.2.12479018"

      - name: Set NDK environment
        run: |
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Install npm dependencies
        run: npm ci
        working-directory: app

      - name: Inject build version
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="0.1.0+${SHORT_SHA}"
          VERSION_CODE=$(( $(date -u +%s) / 60 ))
          jq --arg v "$VERSION" '.version = $v' app/src-tauri/tauri.conf.json > tmp.json && mv tmp.json app/src-tauri/tauri.conf.json
          echo "TAURI_ANDROID_VERSION_CODE=${VERSION_CODE}" >> "$GITHUB_ENV"
          echo "App version: ${VERSION}, versionCode: ${VERSION_CODE}"

      - name: Initialize Tauri Android
        run: npx tauri android init
        working-directory: app

      - name: Copy custom Android icons
        run: |
          RES_DIR=app/src-tauri/gen/android/app/src/main/res
          cp -r app/src-tauri/icons/android/* "$RES_DIR/"
          echo "Copied icons to $RES_DIR"
          ls -la "$RES_DIR"/mipmap-*/ic_launcher*.png

      - name: Add Android permissions
        run: |
          MANIFEST=app/src-tauri/gen/android/app/src/main/AndroidManifest.xml
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' "$MANIFEST"

      - name: Add share intent filters
        run: |
          MANIFEST=app/src-tauri/gen/android/app/src/main/AndroidManifest.xml
          sed -i '/<\/activity>/i\
                      <intent-filter>\
                          <action android:name="android.intent.action.SEND" />\
                          <category android:name="android.intent.category.DEFAULT" />\
                          <data android:mimeType="audio/*" />\
                      </intent-filter>\
                      <intent-filter>\
                          <action android:name="android.intent.action.SEND" />\
                          <category android:name="android.intent.category.DEFAULT" />\
                          <data android:mimeType="text/plain" />\
                      </intent-filter>' "$MANIFEST"

      - name: Install custom MainActivity for share intent
        run: |
          MAIN_DIR=app/src-tauri/gen/android/app/src/main/java/dev/lestash/app
          cp app/android-src/MainActivity.kt "$MAIN_DIR/MainActivity.kt"

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > /tmp/lestash-release.jks

      - name: Build APK
        run: npx tauri android build --target aarch64 --target x86_64
        working-directory: app

      - name: Sign APK
        run: |
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -1)
          unsigned=$(find app/src-tauri/gen/android -name '*-unsigned.apk' | head -1)
          signed="${unsigned%-unsigned.apk}.apk"
          "$APKSIGNER" sign --ks /tmp/lestash-release.jks --ks-pass pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }} --out "$signed" "$unsigned"
          "$APKSIGNER" verify "$signed"

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: lestash-android
          path: app/src-tauri/gen/android/app/build/outputs/apk/**/*-release.apk
          if-no-files-found: error

      - name: Upload to tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/src-tauri/gen/android/app/build/outputs/apk/**/*-release.apk

      - name: Set build timestamp
        if: github.ref == 'refs/heads/main'
        run: echo "BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_ENV"

      - name: Delete old dev release
        if: github.ref == 'refs/heads/main'
        run: gh release delete dev --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create dev release
        if: github.ref == 'refs/heads/main'
        run: |
          gh release create dev \
            --title "Dev Build — ${{ env.BUILD_TIME }} (${{ github.sha }})" \
            --prerelease \
            --notes "$(cat <<'EOF'
          Rolling development build from `main`.
          Updated on every push — install via [Obtainium](https://obtainium.imranr.dev/).

          **Built:** ${{ env.BUILD_TIME }}
          **Commit:** [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          EOF
          )" \
            app/src-tauri/gen/android/app/build/outputs/apk/universal/release/*-release.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
