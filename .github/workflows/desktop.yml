name: Desktop Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: lestash-macos
          - os: ubuntu-latest
            artifact: lestash-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            cmake \
            libclang-dev \
            libasound2-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Add x86_64 Rust target (macOS universal)
        if: runner.os == 'macOS'
        run: rustup target add x86_64-apple-darwin

      - name: Patch whisper.cpp for macOS CI
        if: runner.os == 'macOS'
        run: |
          echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> "$GITHUB_ENV"
          echo "CMAKE_OSX_DEPLOYMENT_TARGET=11.0" >> "$GITHUB_ENV"
          cd app && cargo fetch --manifest-path src-tauri/Cargo.toml
          find ~/.cargo/registry/src -path "*/whisper-rs-sys-*/whisper.cpp/ggml/src/ggml-cpu/CMakeLists.txt" \
            -exec sed -i '' 's/if (GGML_NATIVE)/if (FALSE) # patched for macOS CI/' {} \;

      - name: Install npm dependencies
        run: npm ci
        working-directory: app

      - name: Inject build version
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.1.0-dev.$(date -u +%Y%m%d.%H%M)"
          fi
          jq --arg v "$VERSION" '.version = $v' app/src-tauri/tauri.conf.json > tmp.json && mv tmp.json app/src-tauri/tauri.conf.json
          echo "App version: ${VERSION}"

      - name: Build Tauri app (macOS universal)
        if: runner.os == 'macOS'
        run: npx tauri build --target universal-apple-darwin
        working-directory: app

      - name: Build Tauri app (Linux)
        if: runner.os == 'Linux'
        run: npx tauri build
        working-directory: app

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            app/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            app/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
          if-no-files-found: error

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            app/src-tauri/target/release/bundle/appimage/*.AppImage
            app/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  release:
    needs: build-desktop
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name '*.dmg' -o -name '*.AppImage' -o -name '*.app.tar.gz' -o -name '*.deb' \) | \
            xargs -I{} cp {} release-files/
          ls -la release-files/

      - name: Upload to tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*

      - name: Extract dev version from artifacts
        if: github.ref == 'refs/heads/main'
        run: |
          DEV_VERSION=$(ls release-files/*.AppImage 2>/dev/null | head -1 | grep -oP '\d+\.\d+\.\d+-dev\.\d+\.\d+' || echo "0.1.0-dev")
          echo "DEV_VERSION=${DEV_VERSION}" >> "$GITHUB_ENV"

      - name: Delete old dev-desktop release
        if: github.ref == 'refs/heads/main'
        run: |
          OLD_TAG=$(gh release list --json tagName -q '[.[].tagName | select(test("^v0\\.1\\.0-dev\\..*-desktop$"))][0] // empty')
          if [ -n "$OLD_TAG" ]; then
            echo "Deleting old dev-desktop release: $OLD_TAG"
            gh release delete "$OLD_TAG" --yes --cleanup-tag
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Create dev-desktop release
        if: github.ref == 'refs/heads/main'
        run: |
          DEV_TAG="v${{ env.DEV_VERSION }}-desktop"
          gh release create "$DEV_TAG" \
            --title "Dev Desktop Build — ${DEV_TAG} (${{ github.sha }})" \
            --prerelease \
            --notes "$(cat <<EOF
          Rolling desktop build from \`main\`.

          **Version:** \`${{ env.DEV_VERSION }}\`
          **Commit:** [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

          ## Install

          **macOS:** Download \`.dmg\`, open, drag to Applications
          **Linux (Debian/Ubuntu):** \`sudo dpkg -i lestash_*.deb\`
          **Linux (AppImage):** \`chmod +x lestash_*.AppImage && ./lestash_*.AppImage\`
          EOF
          )" \
            release-files/*
          gh release edit "$DEV_TAG" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
