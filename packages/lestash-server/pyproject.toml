[project]
name = "lestash-server"
version = "1.41.0"
description = "HTTPS API server for Le Stash"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "lestash",
    "lestash-voice",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "python-multipart>=0.0.9",
]

[project.scripts]
lestash-server = "lestash_server.cli:main"

[tool.uv.sources]
lestash = { workspace = true }
lestash-voice = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lestash_server"]
