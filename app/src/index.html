<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LeStash</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --border: #0f3460;
      --text: #e0e0e0;
      --muted: #888;
      --accent: #e94560;
      --ok: #4ecca3;
      --error: #e94560;
      --warn: #f0a500;
      --src-linkedin: #0077b5;
      --src-bluesky: #0085ff;
      --src-youtube: #ff0000;
      --src-arxiv: #b31b1b;
      --src-microblog: #ff8800;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: calc(env(safe-area-inset-top, 0px))
               calc(env(safe-area-inset-right, 0px))
               calc(env(safe-area-inset-bottom, 0px))
               calc(env(safe-area-inset-left, 0px));
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      gap: 0.75rem;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; white-space: nowrap; }
    .dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0;
    }
    .dot.ok { background: var(--ok); }
    .dot.error { background: var(--error); }
    .spacer { flex: 1; }
    .gear-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 1.2rem; padding: 0.25rem;
    }
    .gear-btn:hover { color: var(--text); }

    /* ── Tabs ── */
    nav {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    nav button {
      flex: 1;
      background: none; border: none; color: var(--muted);
      padding: 0.6rem 0; cursor: pointer; font-family: inherit;
      font-size: 0.85rem; border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    nav button:hover { color: var(--text); }
    nav button.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Main content ── */
    main {
      flex: 1; overflow-y: auto;
      padding: 1rem;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Filters ── */
    .filters {
      display: flex; gap: 0.5rem; margin-bottom: 1rem;
      flex-wrap: wrap; align-items: center;
    }
    .filters select, .filters input, .filters button {
      font-family: inherit; font-size: 0.8rem;
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 0.4rem 0.6rem;
    }
    .filters select:focus, .filters input:focus {
      outline: none; border-color: var(--accent);
    }
    .search-input {
      flex: 1; min-width: 200px;
    }

    /* ── Item cards ── */
    .item-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .item-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .item-card:hover { border-color: var(--accent); }
    .item-card-header {
      display: flex; align-items: center; gap: 0.5rem;
      margin-bottom: 0.4rem;
    }
    .source-badge {
      font-size: 0.7rem; padding: 0.15rem 0.4rem;
      border-radius: 3px; color: #fff; white-space: nowrap;
      font-weight: bold;
    }
    .source-badge.linkedin { background: var(--src-linkedin); }
    .source-badge.bluesky { background: var(--src-bluesky); }
    .source-badge.youtube { background: var(--src-youtube); }
    .source-badge.arxiv { background: var(--src-arxiv); }
    .source-badge.microblog { background: var(--src-microblog); }
    .item-subtype {
      font-size: 0.75rem; color: var(--muted);
    }
    .item-date {
      margin-left: auto; font-size: 0.75rem; color: var(--muted);
      white-space: nowrap;
    }
    .item-preview {
      font-size: 0.85rem; color: var(--text);
      line-height: 1.4;
    }
    .item-meta {
      display: flex; gap: 1rem; margin-top: 0.3rem;
      font-size: 0.75rem; color: var(--muted);
    }

    /* ── Item detail (expanded) ── */
    .item-detail {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
      margin-top: 0.5rem;
      font-size: 0.85rem;
      line-height: 1.5;
    }
    .item-detail-field {
      margin-bottom: 0.5rem;
    }
    .item-detail-field label {
      color: var(--accent); font-weight: bold;
      display: block; margin-bottom: 0.15rem;
    }
    .item-detail-content {
      white-space: pre-wrap; word-break: break-word;
      max-height: 400px; overflow-y: auto;
    }
    .item-detail a {
      color: var(--accent); text-decoration: none;
    }
    .item-detail a:hover { text-decoration: underline; }
    .item-detail-meta {
      background: var(--surface);
      border-radius: 4px;
      padding: 0.5rem;
      font-size: 0.75rem;
      white-space: pre-wrap;
      max-height: 200px;
      overflow-y: auto;
      color: var(--muted);
    }

    /* ── Load more ── */
    .load-more {
      display: block; margin: 1rem auto 0;
      background: var(--surface); color: var(--accent);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 0.5rem 1.5rem; cursor: pointer;
      font-family: inherit; font-size: 0.85rem;
    }
    .load-more:hover { border-color: var(--accent); }
    .load-more:disabled { opacity: 0.5; cursor: default; }

    /* ── Sources table ── */
    .source-table { width: 100%; border-collapse: collapse; }
    .source-table th, .source-table td {
      text-align: left; padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .source-table th {
      color: var(--muted); font-weight: normal;
      font-size: 0.75rem; text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .sync-btn {
      background: var(--surface); color: var(--ok);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 0.3rem 0.75rem; cursor: pointer;
      font-family: inherit; font-size: 0.8rem;
    }
    .sync-btn:hover { border-color: var(--ok); }
    .sync-btn:disabled { opacity: 0.5; cursor: default; }
    .sync-status { font-size: 0.75rem; }
    .sync-status.completed { color: var(--ok); }
    .sync-status.failed { color: var(--error); }
    .sync-status.running { color: var(--warn); }

    /* ── Stats ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
    }
    .stat-card .stat-value {
      font-size: 1.5rem; font-weight: bold;
      color: var(--accent);
    }
    .stat-card .stat-label {
      font-size: 0.75rem; color: var(--muted);
      margin-top: 0.25rem;
    }
    .bar-chart { display: flex; flex-direction: column; gap: 0.5rem; }
    .bar-row {
      display: flex; align-items: center; gap: 0.75rem;
    }
    .bar-label {
      width: 90px; font-size: 0.8rem;
      text-align: right; color: var(--muted);
    }
    .bar-track {
      flex: 1; height: 22px;
      background: var(--surface);
      border-radius: 3px; overflow: hidden;
    }
    .bar-fill {
      height: 100%; border-radius: 3px;
      display: flex; align-items: center;
      padding-left: 0.5rem;
      font-size: 0.7rem; color: #fff;
      min-width: fit-content;
      transition: width 0.3s ease;
    }

    /* ── Settings modal ── */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      width: 90%; max-width: 400px;
    }
    .modal h2 { font-size: 1rem; margin-bottom: 1rem; }
    .modal label {
      display: block; font-size: 0.8rem;
      color: var(--muted); margin-bottom: 0.25rem;
    }
    .modal input {
      width: 100%; font-family: inherit; font-size: 0.85rem;
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 0.4rem 0.6rem; margin-bottom: 0.75rem;
    }
    .modal input:focus { outline: none; border-color: var(--accent); }
    .modal-actions {
      display: flex; gap: 0.5rem; justify-content: flex-end;
      margin-top: 0.5rem;
    }
    .modal-actions button {
      font-family: inherit; font-size: 0.85rem;
      padding: 0.4rem 1rem; border-radius: 4px;
      cursor: pointer; border: 1px solid var(--border);
    }
    .btn-save {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }
    .btn-cancel {
      background: var(--surface); color: var(--text);
    }

    /* ── Toasts ── */
    .toast-container {
      position: fixed;
      top: calc(0.75rem + env(safe-area-inset-top, 0px));
      right: calc(0.75rem + env(safe-area-inset-right, 0px));
      z-index: 200;
      display: flex; flex-direction: column; gap: 0.4rem;
      pointer-events: none;
    }
    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--muted);
      border-radius: 4px;
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      max-width: 320px;
      animation: toast-in-out 4s ease forwards;
    }
    .toast.ok { border-left-color: var(--ok); }
    .toast.error { border-left-color: var(--error); }
    @keyframes toast-in-out {
      0% { opacity: 0; transform: translateX(20px); }
      8% { opacity: 1; transform: translateX(0); }
      85% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center; padding: 3rem 1rem;
      color: var(--muted);
    }
    .empty-state .empty-icon { font-size: 2rem; margin-bottom: 0.5rem; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Disconnected banner ── */
    .disconnect-banner {
      display: none;
      background: var(--error);
      color: #fff;
      text-align: center;
      padding: 0.4rem;
      font-size: 0.8rem;
      flex-shrink: 0;
    }
    .disconnect-banner.visible { display: block; }

    /* ── Skeleton loading ── */
    .skeleton-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem;
    }
    .skeleton-line {
      height: 0.85rem;
      background: linear-gradient(90deg, var(--border) 25%, var(--surface) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 3px;
      margin-bottom: 0.4rem;
    }
    .skeleton-line.short { width: 40%; }
    .skeleton-line.medium { width: 70%; }

    /* ── Subtype filters ── */
    .subtype-filters {
      display: flex; gap: 0.5rem; flex-wrap: wrap;
      width: 100%; margin-top: 0.25rem;
    }
    .subtype-filters label {
      font-size: 0.75rem; color: var(--muted);
      display: flex; align-items: center; gap: 0.2rem;
      cursor: pointer;
    }
    .subtype-filters input[type="checkbox"] { accent-color: var(--accent); }

    /* ── Recent summary ── */
    .recent-summary {
      font-size: 0.85rem; color: var(--muted);
      margin-bottom: 0.75rem;
    }
    .recent-summary strong { color: var(--accent); }

    /* ── Import dropzone ── */
    .import-dropzone {
      border: 2px dashed var(--border);
      border-radius: 6px;
      padding: 1.5rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .import-dropzone:hover,
    .import-dropzone.dragover { border-color: var(--accent); color: var(--text); }
    .import-dropzone a { color: var(--accent); }

    /* ── Voice recorder + note editor ── */
    .voice-recorder {
      display: flex; align-items: center; gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .record-btn {
      background: var(--surface); color: var(--accent);
      border: 2px solid var(--accent); border-radius: 50%;
      width: 56px; height: 56px; cursor: pointer;
      font-family: inherit; font-size: 0.75rem; font-weight: bold;
      transition: all 0.2s;
    }
    .record-btn:hover { background: var(--accent); color: #fff; }
    .record-btn.recording {
      background: var(--error); border-color: var(--error); color: #fff;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    .record-status { font-size: 0.8rem; color: var(--muted); }
    .transcript-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 0.75rem;
      font-size: 0.85rem; color: var(--muted);
      min-height: 3rem; white-space: pre-wrap;
    }
    .note-textarea {
      width: 100%; min-height: 120px;
      font-family: inherit; font-size: 0.85rem;
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 0.75rem; resize: vertical;
    }
    .note-textarea:focus { outline: none; border-color: var(--accent); }
    .note-actions {
      display: flex; gap: 0.5rem; margin-top: 0.75rem;
      justify-content: flex-end;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 0.5rem 0.75rem; }
      main { padding: 0.75rem; }
      nav button { padding: 0.75rem 0; min-height: 44px; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .bar-label { width: 70px; font-size: 0.75rem; }
      .item-meta { flex-wrap: wrap; }
      .sync-btn { min-height: 44px; min-width: 44px; }
      .load-more { min-height: 44px; }
      .gear-btn { min-width: 44px; min-height: 44px; font-size: 1.4rem; }
      .filters select, .filters input { min-height: 44px; }
      .modal { width: 95%; max-width: none; }
      .source-table th:nth-child(2),
      .source-table td:nth-child(2) { display: none; }
      .subtype-filters label { min-height: 44px; }
    }
  </style>
</head>
<body>

  <!-- Disconnect banner -->
  <div class="disconnect-banner" id="disconnect-banner">Server unreachable — check connection or settings <button onclick="reconnect()" style="margin-left:0.5rem;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);color:#fff;border-radius:4px;padding:0.2rem 0.6rem;cursor:pointer;font-family:inherit;font-size:0.8rem">Retry</button></div>

  <!-- Header -->
  <header>
    <h1>LeStash</h1>
    <div class="dot" id="dot" title="Server connection"></div>
    <span class="spacer"></span>
    <button class="gear-btn" id="settings-btn" title="Settings">&#9881;</button>
  </header>

  <!-- Tabs -->
  <nav id="tabs">
    <button class="active" data-tab="feed">Feed</button>
    <button data-tab="recent">Recent</button>
    <button data-tab="notes">Notes</button>
    <button data-tab="search">Search</button>
    <button data-tab="sources">Sources</button>
    <button data-tab="stats">Stats</button>
    <button data-tab="debug">Debug</button>
  </nav>

  <!-- Main content -->
  <main>
    <!-- Feed tab -->
    <div class="tab-content active" id="tab-feed">
      <div class="filters">
        <select id="feed-source">
          <option value="">All sources</option>
        </select>
        <label style="font-size:0.8rem;display:flex;align-items:center;gap:0.3rem;color:var(--muted)">
          <input type="checkbox" id="feed-own"> Own
        </label>
        <div class="subtype-filters" id="subtype-filters">
          <label><input type="checkbox" value="post" checked> Posts</label>
          <label><input type="checkbox" value="comment" checked> Comments</label>
          <label><input type="checkbox" value="reaction"> Reactions</label>
          <label><input type="checkbox" value="invitation"> Invitations</label>
          <label><input type="checkbox" value="message"> Messages</label>
        </div>
      </div>
      <div class="item-list" id="feed-list"></div>
      <button class="load-more" id="feed-more" onclick="loadMoreFeed()" style="display:none">Load more</button>
    </div>

    <!-- Search tab -->
    <div class="tab-content" id="tab-search">
      <div class="filters">
        <input type="text" class="search-input" id="search-input"
               placeholder="Search your knowledge base..." autocomplete="off">
      </div>
      <div class="item-list" id="search-list"></div>
    </div>

    <!-- Notes tab -->
    <div class="tab-content" id="tab-notes">
      <div class="voice-recorder">
        <button class="record-btn" id="record-btn" onclick="toggleRecording()">Record</button>
        <span class="record-status" id="record-status"></span>
      </div>
      <div id="note-editor" style="display:none">
        <label style="font-size:0.8rem;color:var(--muted);display:block;margin-bottom:0.25rem">Original Transcript</label>
        <div class="transcript-box" id="original-transcript"></div>
        <label style="font-size:0.8rem;color:var(--muted);display:block;margin:0.75rem 0 0.25rem">Edited Note</label>
        <textarea class="note-textarea" id="edited-note" placeholder="Edit your note here..."></textarea>
        <div class="note-actions">
          <button class="sync-btn" onclick="refineWithLLM()" id="refine-btn">Refine with AI</button>
          <button class="btn-save" onclick="saveVoiceNote()">Save</button>
        </div>
      </div>
      <h3 style="margin-top:1.5rem;font-size:0.85rem;color:var(--muted)">Saved Notes</h3>
      <div class="item-list" id="notes-list"></div>
    </div>

    <!-- Recent tab -->
    <div class="tab-content" id="tab-recent">
      <div class="filters">
        <select id="recent-period">
          <option value="6">Last 6 hours</option>
          <option value="24" selected>Last 24 hours</option>
          <option value="168">Last 7 days</option>
          <option value="720">Last 30 days</option>
        </select>
      </div>
      <div class="recent-summary" id="recent-summary"></div>
      <div class="item-list" id="recent-list"></div>
    </div>

    <!-- Sources tab -->
    <div class="tab-content" id="tab-sources">
      <!-- Import section -->
      <div style="margin-bottom:1.5rem">
        <h3 style="font-size:0.85rem;color:var(--muted);margin-bottom:0.5rem">Import</h3>
        <input type="file" id="import-file" accept=".zip,.json" style="display:none">
        <div class="import-dropzone" id="import-dropzone">
          Drop a file here or <a href="#" onclick="document.getElementById('import-file').click();return false">browse</a>
          <div style="font-size:0.75rem;margin-top:0.4rem">JSON, Google Takeout (Gemini, Keep)</div>
        </div>
        <div id="import-progress" style="display:none;padding:0.75rem;color:var(--muted)">
          <span class="spinner"></span> Importing...
        </div>
        <div id="import-result" style="display:none;padding:0.75rem;background:var(--surface);border-radius:6px;margin-top:0.5rem;font-size:0.85rem"></div>
      </div>

      <table class="source-table" id="sources-table">
        <thead>
          <tr><th>Source</th><th>Description</th><th>Last Sync</th><th></th></tr>
        </thead>
        <tbody></tbody>
      </table>
      <h3 style="margin-top:1.5rem;font-size:0.85rem;color:var(--muted)">Recent Syncs</h3>
      <table class="source-table" id="sync-log-table" style="margin-top:0.5rem">
        <thead>
          <tr><th>Source</th><th>Started</th><th>Status</th><th>Items</th><th>Error</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- Stats tab -->
    <div class="tab-content" id="tab-stats">
      <div class="stats-grid" id="stats-cards"></div>
      <h3 style="font-size:0.85rem;color:var(--muted);margin-bottom:0.75rem">Items by source</h3>
      <div class="bar-chart" id="stats-chart"></div>
    </div>

    <!-- Debug tab -->
    <div class="tab-content" id="tab-debug">
      <div id="debug-info" style="background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:0.75rem;margin-bottom:1rem;font-size:0.8rem;line-height:1.6"></div>
      <div style="display:flex;gap:0.5rem;margin-bottom:1rem">
        <button class="sync-btn" onclick="debugTestConnection()">Test Connection</button>
        <button class="sync-btn" onclick="reconnect()">Reconnect</button>
      </div>
      <h3 style="font-size:0.85rem;color:var(--muted);margin-bottom:0.5rem">API Log</h3>
      <div id="debug-log" style="max-height:60vh;overflow-y:auto;font-size:0.75rem"></div>
    </div>
  </main>

  <!-- Settings modal -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal">
      <h2>Settings</h2>
      <label for="s-host">Server host</label>
      <input type="text" id="s-host">
      <label for="s-port">Server port</label>
      <input type="number" id="s-port">
      <hr style="border-color:var(--border);margin:0.75rem 0">
      <label for="s-llm-url">LLM proxy URL</label>
      <input type="text" id="s-llm-url" placeholder="http://localhost:4000">
      <label for="s-llm-model">LLM model</label>
      <input type="text" id="s-llm-model" placeholder="claude-sonnet-4-20250514">
      <label for="s-llm-prompt">Refine prompt</label>
      <textarea id="s-llm-prompt" style="width:100%;min-height:60px;font-family:inherit;font-size:0.8rem;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:0.4rem 0.6rem;resize:vertical" placeholder="Clean up this voice note..."></textarea>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeSettings()">Cancel</button>
        <button class="btn-save" onclick="saveSettingsForm()">Save</button>
      </div>
    </div>
  </div>

  <!-- Toasts -->
  <div class="toast-container" id="toasts"></div>

  <script>
    /* ── Error visibility (Android WebView debugging) ── */
    window.onerror = function(msg, url, line) {
      document.title = 'ERR: ' + msg;
      console.error('JS Error:', msg, 'at', url, ':', line);
    };

    /* ── Tauri interop ── */
    const IS_TAURI = window.__TAURI_INTERNALS__ !== undefined;
    let tauriInvoke = null;
    let tauriListen = null;

    if (IS_TAURI) {
      tauriInvoke = window.__TAURI_INTERNALS__.invoke;
      tauriListen = async function(event, handler) {
        return window.__TAURI_INTERNALS__.invoke('plugin:event|listen', {
          event: event,
          target: { kind: 'Any' },
          handler: window.__TAURI_INTERNALS__.transformCallback(handler),
        });
      };
    }

    /* ── Settings ── */
    const SETTINGS_KEY = 'lestash-settings';
    const DEFAULT_SETTINGS = {
      host: 'pop-mini.monkey-ladon.ts.net', port: 8444,
      llmUrl: '', llmModel: '', llmPrompt: '',
    };

    let settings = loadSettings();

    function loadSettings() {
      try {
        const raw = localStorage.getItem(SETTINGS_KEY);
        if (raw) return { ...DEFAULT_SETTINGS, ...JSON.parse(raw) };
      } catch {}
      return { ...DEFAULT_SETTINGS };
    }

    function saveSettings(s) {
      settings = s;
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
    }

    function getApiBase() {
      if (IS_TAURI) return `https://${settings.host}:${settings.port}`;
      return '';
    }

    function openSettings() {
      document.getElementById('s-host').value = settings.host;
      document.getElementById('s-port').value = settings.port;
      document.getElementById('s-llm-url').value = settings.llmUrl || '';
      document.getElementById('s-llm-model').value = settings.llmModel || '';
      document.getElementById('s-llm-prompt').value = settings.llmPrompt || '';
      document.getElementById('settings-modal').classList.add('open');
    }

    function closeSettings() {
      document.getElementById('settings-modal').classList.remove('open');
    }

    function saveSettingsForm() {
      saveSettings({
        host: document.getElementById('s-host').value || DEFAULT_SETTINGS.host,
        port: parseInt(document.getElementById('s-port').value) || DEFAULT_SETTINGS.port,
        llmUrl: document.getElementById('s-llm-url').value,
        llmModel: document.getElementById('s-llm-model').value,
        llmPrompt: document.getElementById('s-llm-prompt').value,
      });
      closeSettings();
      showToast('Settings saved — reloading...', 'ok');
      setTimeout(() => location.reload(), 500);
    }

    /* ── Debug logging ── */
    const debugLog = [];
    function addDebugLog(method, url, status, time, error) {
      debugLog.unshift({ ts: new Date().toISOString(), method, url, status, time, error });
      if (debugLog.length > 50) debugLog.pop();
      renderDebugLog();
    }

    function renderDebugLog() {
      const el = document.getElementById('debug-log');
      if (!el) return;
      el.innerHTML = debugLog.map(e => {
        const color = e.error ? 'var(--error)' : (e.status === 200 ? 'var(--ok)' : 'var(--warn)');
        const ts = e.ts.split('T')[1].split('.')[0];
        return `<div style="padding:0.3rem 0;border-bottom:1px solid var(--border)">
          <span style="color:var(--muted)">${ts}</span>
          <span style="color:${color}">${e.status}</span>
          <span>${e.method}</span>
          <span style="color:var(--muted);word-break:break-all">${e.url}</span>
          ${e.time ? `<span style="color:var(--muted)">${e.time}ms</span>` : ''}
          ${e.error ? `<div style="color:var(--error);margin-top:0.2rem">${e.error}</div>` : ''}
        </div>`;
      }).join('');
    }

    function renderDebugInfo() {
      const el = document.getElementById('debug-info');
      if (!el) return;
      el.innerHTML = `
        <div><strong>API Base:</strong> ${getApiBase() || '(relative)'}</div>
        <div><strong>Host:</strong> ${settings.host}</div>
        <div><strong>Port:</strong> ${settings.port}</div>
        <div><strong>IS_TAURI:</strong> ${IS_TAURI}</div>
        <div><strong>tauriInvoke:</strong> ${tauriInvoke ? 'available' : 'null'}</div>
        <div><strong>User Agent:</strong> ${navigator.userAgent.substring(0, 80)}...</div>
      `;
    }

    async function debugTestConnection() {
      const base = getApiBase();
      addDebugLog('TEST', base + '/api/health', '...', null);
      try {
        const start = performance.now();
        const res = await fetch(base + '/api/health');
        const time = Math.round(performance.now() - start);
        const data = await res.json();
        addDebugLog('GET', base + '/api/health', res.status, time);
        addDebugLog('INFO', 'Health response', data.status, null, JSON.stringify(data));
      } catch (e) {
        addDebugLog('GET', base + '/api/health', 'ERR', null, e.message);
      }
      try {
        const start = performance.now();
        const res = await fetch(base + '/api/items?limit=1');
        const time = Math.round(performance.now() - start);
        const data = await res.json();
        addDebugLog('GET', base + '/api/items?limit=1', res.status, time, `${data.total} total items`);
      } catch (e) {
        addDebugLog('GET', base + '/api/items?limit=1', 'ERR', null, e.message);
      }
    }

    /* ── API helper ── */
    async function api(path, opts) {
      const fullUrl = `${getApiBase()}${path}`;
      const start = performance.now();
      try {
        const res = await fetch(fullUrl, opts);
        const time = Math.round(performance.now() - start);
        addDebugLog(opts?.method || 'GET', fullUrl, res.status, time);
        if (!res.ok) {
          const body = await res.text();
          throw new Error(`${res.status}: ${body}`);
        }
        return res.json();
      } catch (e) {
        const time = Math.round(performance.now() - start);
        if (!e.message.startsWith('4') && !e.message.startsWith('5')) {
          addDebugLog(opts?.method || 'GET', fullUrl, 'ERR', time, e.message);
        }
        throw e;
      }
    }

    /* ── Toasts ── */
    function showToast(message, level) {
      const el = document.createElement('div');
      el.className = `toast ${level || ''}`;
      el.textContent = message;
      const container = document.getElementById('toasts');
      while (container.children.length >= 5) container.removeChild(container.firstChild);
      container.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    /* ── Tabs ── */
    document.getElementById('tabs').addEventListener('click', e => {
      if (e.target.tagName !== 'BUTTON') return;
      document.querySelectorAll('#tabs button').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      e.target.classList.add('active');
      const tab = e.target.dataset.tab;
      document.getElementById(`tab-${tab}`).classList.add('active');
      if (tab === 'feed' && feedItems.length === 0) loadFeed();
      if (tab === 'recent') loadRecent();
      if (tab === 'search') document.getElementById('search-input').focus();
      if (tab === 'notes') { loadSavedNotes(); checkSttModel(); }
      if (tab === 'sources') loadSources();
      if (tab === 'stats') loadStats();
      if (tab === 'debug') { renderDebugInfo(); renderDebugLog(); }
    });

    /* ── Relative time ── */
    function relTime(dateStr) {
      if (!dateStr) return '-';
      const d = new Date(dateStr);
      const now = new Date();
      const diff = (now - d) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
      if (diff < 604800) return `${Math.floor(diff/86400)}d ago`;
      return d.toLocaleDateString();
    }

    /* ── Source badge ── */
    function sourceClass(source) {
      const s = (source || '').split('/')[0];
      if (['linkedin','bluesky','youtube','arxiv','microblog'].includes(s)) return s;
      return '';
    }

    function sourceName(subtype) {
      return (subtype || '').split('/')[0];
    }

    /* ── Render item card ── */
    function renderCard(item) {
      const card = document.createElement('div');
      card.className = 'item-card';
      card.innerHTML = `
        <div class="item-card-header">
          <span class="source-badge ${sourceClass(item.subtype)}">${sourceName(item.subtype)}</span>
          <span class="item-subtype">${item.subtype}</span>
          <span class="item-date">${relTime(item.created_at)}</span>
        </div>
        <div class="item-preview">${escHtml(item.preview)}</div>
        <div class="item-meta">
          ${item.author_display !== '-' ? `<span>by ${escHtml(item.author_display)}</span>` : ''}
          ${item.actor_display !== '-' ? `<span>actor: ${escHtml(item.actor_display)}</span>` : ''}
          ${item.is_own_content ? '<span style="color:var(--ok)">own</span>' : ''}
        </div>
      `;
      card.addEventListener('click', () => toggleDetail(card, item));
      return card;
    }

    function toggleDetail(card, item) {
      const existing = card.querySelector('.item-detail');
      if (existing) { existing.remove(); return; }

      const detail = document.createElement('div');
      detail.className = 'item-detail';

      let html = '';
      html += `<div class="item-detail-field"><label>ID</label>${item.id}</div>`;
      html += `<div class="item-detail-field"><label>Type</label>${escHtml(item.subtype)}</div>`;
      if (item.title) html += `<div class="item-detail-field"><label>Title</label>${escHtml(item.title)}</div>`;
      if (item.url) html += `<div class="item-detail-field"><label>URL</label><a href="${escHtml(item.url)}" target="_blank" rel="noopener">${escHtml(item.url)}</a></div>`;
      html += `<div class="item-detail-field"><label>Author</label>${escHtml(item.author_display)}</div>`;
      if (item.created_at) html += `<div class="item-detail-field"><label>Created</label>${new Date(item.created_at).toLocaleString()}</div>`;
      html += `<div class="item-detail-field"><label>Content</label><div class="item-detail-content">${escHtml(item.content)}</div></div>`;
      if (item.metadata) {
        html += `<div class="item-detail-field"><label>Metadata</label><div class="item-detail-meta">${escHtml(JSON.stringify(item.metadata, null, 2))}</div></div>`;
      }

      detail.innerHTML = html;
      card.appendChild(detail);
    }

    function escHtml(s) {
      if (!s) return '';
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ── Feed ── */
    let feedItems = [];
    let feedOffset = 0;
    const FEED_LIMIT = 20;

    async function loadFeed(append) {
      if (!append) { feedOffset = 0; feedItems = []; }
      const list = document.getElementById('feed-list');
      const btn = document.getElementById('feed-more');

      if (!append) list.innerHTML = renderSkeletons(5);

      try {
        const source = document.getElementById('feed-source').value;
        const own = document.getElementById('feed-own').checked;
        let url = `/api/items?limit=${FEED_LIMIT}&offset=${feedOffset}`;
        if (source) url += `&source=${encodeURIComponent(source)}`;
        if (own) url += `&own=true`;

        // Subtype exclusions
        const excluded = getExcludedSubtypes();
        if (excluded) url += `&exclude_subtype=${encodeURIComponent(excluded)}`;

        const data = await api(url);

        if (!append) list.innerHTML = '';

        if (data.items.length === 0 && feedItems.length === 0) {
          list.innerHTML = '<div class="empty-state"><div class="empty-icon">&#128218;</div>No items yet. Sync a source to get started.</div>';
          btn.style.display = 'none';
          return;
        }

        data.items.forEach(item => {
          feedItems.push(item);
          list.appendChild(renderCard(item));
        });

        feedOffset += data.items.length;
        btn.style.display = feedOffset < data.total ? '' : 'none';
      } catch (e) {
        if (!append) list.innerHTML = '';
        showToast(`Failed to load items: ${e.message}`, 'error');
      }
    }

    function loadMoreFeed() { loadFeed(true); }

    document.getElementById('feed-source').addEventListener('change', () => loadFeed());
    document.getElementById('feed-own').addEventListener('change', () => loadFeed());

    /* ── Subtype filters ── */
    const SUBTYPE_STORAGE_KEY = 'lestash-subtype-filters';

    function getExcludedSubtypes() {
      const checks = document.querySelectorAll('#subtype-filters input[type="checkbox"]');
      const excluded = [];
      checks.forEach(cb => { if (!cb.checked) excluded.push(cb.value); });
      return excluded.join(',');
    }

    function saveSubtypeFilters() {
      const checks = document.querySelectorAll('#subtype-filters input[type="checkbox"]');
      const state = {};
      checks.forEach(cb => { state[cb.value] = cb.checked; });
      localStorage.setItem(SUBTYPE_STORAGE_KEY, JSON.stringify(state));
    }

    function loadSubtypeFilters() {
      try {
        const raw = localStorage.getItem(SUBTYPE_STORAGE_KEY);
        if (!raw) return;
        const state = JSON.parse(raw);
        document.querySelectorAll('#subtype-filters input[type="checkbox"]').forEach(cb => {
          if (cb.value in state) cb.checked = state[cb.value];
        });
      } catch {}
    }

    loadSubtypeFilters();
    document.getElementById('subtype-filters').addEventListener('change', () => {
      saveSubtypeFilters();
      loadFeed();
    });

    /* ── Recent Activity ── */
    async function loadRecent() {
      const list = document.getElementById('recent-list');
      const summary = document.getElementById('recent-summary');
      const hours = parseInt(document.getElementById('recent-period').value);

      list.innerHTML = renderSkeletons(5);
      summary.textContent = '';

      try {
        const since = new Date(Date.now() - hours * 3600000).toISOString();
        const data = await api(`/api/items?since=${encodeURIComponent(since)}&limit=100`);

        list.innerHTML = '';

        if (data.items.length === 0) {
          list.innerHTML = '<div class="empty-state">No new items in this period</div>';
          summary.textContent = '';
          return;
        }

        // Count by source
        const counts = {};
        data.items.forEach(i => {
          const s = i.source_type;
          counts[s] = (counts[s] || 0) + 1;
        });
        const parts = Object.entries(counts).map(([k, v]) => `${k}: ${v}`);
        summary.innerHTML = `<strong>${data.items.length}</strong> items synced — ${parts.join(', ')}`;

        data.items.forEach(item => list.appendChild(renderCard(item)));
      } catch (e) {
        list.innerHTML = '';
        showToast(`Failed to load recent items: ${e.message}`, 'error');
      }
    }

    document.getElementById('recent-period').addEventListener('change', loadRecent);

    /* ── Search ── */
    let searchTimer = null;

    document.getElementById('search-input').addEventListener('input', e => {
      clearTimeout(searchTimer);
      const q = e.target.value.trim();
      if (!q) { document.getElementById('search-list').innerHTML = ''; return; }
      searchTimer = setTimeout(() => doSearch(q), 300);
    });

    async function doSearch(q) {
      const list = document.getElementById('search-list');
      list.innerHTML = '<div class="empty-state"><div class="spinner"></div></div>';
      try {
        const data = await api(`/api/items/search?q=${encodeURIComponent(q)}&limit=50`);
        list.innerHTML = '';
        if (data.items.length === 0) {
          list.innerHTML = `<div class="empty-state">No results for "${escHtml(q)}"</div>`;
          return;
        }
        data.items.forEach(item => list.appendChild(renderCard(item)));
      } catch (e) {
        list.innerHTML = '';
        showToast(`Search failed: ${e.message}`, 'error');
      }
    }

    /* ── Sources ── */
    async function loadSources() {
      try {
        const [sources, status] = await Promise.all([
          api('/api/sources'),
          api('/api/sources/status'),
        ]);

        const tbody = document.querySelector('#sources-table tbody');
        tbody.innerHTML = '';
        sources.forEach(s => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><span class="source-badge ${sourceClass(s.name)}">${escHtml(s.name)}</span></td>
            <td>${escHtml(s.description)}</td>
            <td style="font-size:0.8rem;color:var(--muted)">${s.last_sync ? relTime(s.last_sync) : 'never'}</td>
            <td><button class="sync-btn" onclick="triggerSync('${escHtml(s.name)}', this)">Sync</button></td>
          `;
          tbody.appendChild(tr);
        });

        const logTbody = document.querySelector('#sync-log-table tbody');
        logTbody.innerHTML = '';
        if (status.length === 0) {
          logTbody.innerHTML = '<tr><td colspan="5" style="color:var(--muted)">No sync history</td></tr>';
        } else {
          status.forEach(s => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td>${escHtml(s.source_type)}</td>
              <td style="font-size:0.8rem">${s.started_at ? relTime(s.started_at) : '-'}</td>
              <td><span class="sync-status ${s.status}">${s.status}</span></td>
              <td>${s.items_added ? `+${s.items_added}` : '-'}</td>
              <td style="font-size:0.75rem;color:var(--muted)">${s.error_message ? escHtml(s.error_message.substring(0,60)) : '-'}</td>
            `;
            logTbody.appendChild(tr);
          });
        }
      } catch (e) {
        showToast(`Failed to load sources: ${e.message}`, 'error');
      }
    }

    async function triggerSync(name, btn) {
      btn.disabled = true;
      btn.textContent = 'Syncing...';
      try {
        await api(`/api/sources/${encodeURIComponent(name)}/sync`, { method: 'POST' });
        showToast(`Sync started for ${name}`, 'ok');
        // Poll for completion
        setTimeout(() => { loadSources(); btn.disabled = false; btn.textContent = 'Sync'; }, 3000);
      } catch (e) {
        showToast(`Sync failed: ${e.message}`, 'error');
        btn.disabled = false;
        btn.textContent = 'Sync';
      }
    }

    /* ── Voice Notes ── */
    let isRecording = false;
    let recognition = null;
    let currentTranscript = '';
    let refineResult = null;

    function toggleRecording() {
      if (isRecording) stopRecording();
      else startRecording();
    }

    function startRecording() {
      const btn = document.getElementById('record-btn');
      const status = document.getElementById('record-status');
      const editor = document.getElementById('note-editor');

      if (IS_TAURI && tauriInvoke) {
        // Tauri: use whisper-rs (Phase 3)
        tauriInvoke('start_recording').then(() => {
          isRecording = true;
          btn.classList.add('recording');
          btn.textContent = 'Stop';
          status.textContent = 'Recording...';
        }).catch(e => {
          showToast('Recording not available: ' + e, 'error');
          // Fall back to Web Speech API
          startWebSpeech();
        });
      } else {
        startWebSpeech();
      }
    }

    function startWebSpeech() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        showToast('Speech recognition not supported in this browser', 'error');
        return;
      }

      const btn = document.getElementById('record-btn');
      const status = document.getElementById('record-status');

      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';

      currentTranscript = '';
      let interimText = '';

      recognition.onresult = (e) => {
        let final = '';
        let interim = '';
        for (let i = 0; i < e.results.length; i++) {
          if (e.results[i].isFinal) {
            final += e.results[i][0].transcript + ' ';
          } else {
            interim += e.results[i][0].transcript;
          }
        }
        currentTranscript = final.trim();
        interimText = interim;
        status.textContent = currentTranscript
          ? `${currentTranscript.split(' ').length} words`
          : (interim ? 'Listening...' : 'Speak now...');
      };

      recognition.onerror = (e) => {
        if (e.error !== 'no-speech') {
          showToast('Speech error: ' + e.error, 'error');
        }
      };

      recognition.onend = () => {
        if (isRecording) recognition.start(); // restart if still recording
      };

      recognition.start();
      isRecording = true;
      btn.classList.add('recording');
      btn.textContent = 'Stop';
      status.textContent = 'Speak now...';
    }

    function stopRecording() {
      const btn = document.getElementById('record-btn');
      const status = document.getElementById('record-status');
      const editor = document.getElementById('note-editor');

      isRecording = false;
      btn.classList.remove('recording');
      btn.textContent = 'Record';

      if (recognition) {
        recognition.onend = null; // prevent restart
        recognition.stop();
        recognition = null;
      }

      if (IS_TAURI && tauriInvoke) {
        tauriInvoke('stop_recording');
      }

      if (currentTranscript) {
        document.getElementById('original-transcript').textContent = currentTranscript;
        document.getElementById('edited-note').value = currentTranscript;
        editor.style.display = '';
        status.textContent = `${currentTranscript.split(' ').length} words captured`;
        refineResult = null;
      } else {
        status.textContent = 'No speech detected';
      }
    }

    // Listen for Tauri STT events (Phase 3)
    if (IS_TAURI && typeof tauriListen === 'function') {
      tauriListen('stt-transcription', (event) => {
        currentTranscript = event.payload;
        const status = document.getElementById('record-status');
        status.textContent = `${currentTranscript.split(' ').length} words`;
      });
    }

    function checkSttModel() {
      if (IS_TAURI && tauriInvoke) {
        tauriInvoke('get_stt_status').then(status => {
          if (!status.model_exists) {
            document.getElementById('record-status').innerHTML =
              '<span style="color:var(--warn)">Whisper model not found. Download ggml-base.en.bin to ' +
              escHtml(status.model_path) + '</span>';
          }
        }).catch(() => {});
      }
    }

    async function refineWithLLM() {
      const text = document.getElementById('original-transcript').textContent;
      if (!text) return;

      const btn = document.getElementById('refine-btn');
      btn.disabled = true;
      btn.textContent = 'Refining...';

      try {
        const body = { text };
        if (settings.llmPrompt) body.prompt = settings.llmPrompt;
        if (settings.llmModel) body.model = settings.llmModel;

        const data = await api('/api/voice/refine', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        document.getElementById('edited-note').value = data.refined_text;
        refineResult = data;
        showToast('Transcript refined', 'ok');
      } catch (e) {
        showToast('Refine failed: ' + e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Refine with AI';
      }
    }

    async function saveVoiceNote() {
      const original = document.getElementById('original-transcript').textContent;
      const edited = document.getElementById('edited-note').value.trim();
      if (!original && !edited) { showToast('Nothing to save', 'error'); return; }

      const content = edited || original;
      const metadata = { original_transcript: original };
      if (edited && edited !== original) {
        metadata.edited_text = edited;
      }
      if (refineResult) {
        metadata.edit_prompt = refineResult.prompt_used;
        metadata.edit_model = refineResult.model_used;
      }
      metadata.whisper_model = IS_TAURI ? 'whisper-rs' : 'web-speech-api';

      try {
        await api('/api/items', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            source_type: 'voice',
            source_id: 'voice-' + Date.now(),
            content: content,
            is_own_content: true,
            metadata: metadata,
          }),
        });
        showToast('Voice note saved', 'ok');

        // Reset editor
        document.getElementById('note-editor').style.display = 'none';
        document.getElementById('original-transcript').textContent = '';
        document.getElementById('edited-note').value = '';
        document.getElementById('record-status').textContent = '';
        currentTranscript = '';
        refineResult = null;
        loadSavedNotes();
      } catch (e) {
        showToast('Save failed: ' + e.message, 'error');
      }
    }

    async function loadSavedNotes() {
      const list = document.getElementById('notes-list');
      list.innerHTML = renderSkeletons(3);
      try {
        const data = await api('/api/items?source=voice&limit=20');
        list.innerHTML = '';
        if (data.items.length === 0) {
          list.innerHTML = '<div class="empty-state">No voice notes yet. Hit Record to start.</div>';
          return;
        }
        data.items.forEach(item => list.appendChild(renderCard(item)));
      } catch (e) {
        list.innerHTML = '';
        showToast('Failed to load notes: ' + e.message, 'error');
      }
    }

    /* ── Import ── */
    const dropzone = document.getElementById('import-dropzone');
    const importFile = document.getElementById('import-file');

    dropzone.addEventListener('dragover', e => {
      e.preventDefault();
      dropzone.classList.add('dragover');
    });
    dropzone.addEventListener('dragleave', () => {
      dropzone.classList.remove('dragover');
    });
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      if (e.dataTransfer.files.length) uploadImport(e.dataTransfer.files[0]);
    });
    importFile.addEventListener('change', () => {
      if (importFile.files.length) uploadImport(importFile.files[0]);
      importFile.value = '';
    });

    async function uploadImport(file) {
      const progress = document.getElementById('import-progress');
      const result = document.getElementById('import-result');
      progress.style.display = '';
      result.style.display = 'none';

      try {
        const formData = new FormData();
        formData.append('file', file);
        const res = await fetch(`${getApiBase()}/api/import`, {
          method: 'POST',
          body: formData,
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || res.status);

        result.style.display = '';
        let html = `Imported <strong>${data.items_added}</strong> items`;
        html += ` from <strong>${data.source_type}</strong>`;
        if (data.errors.length) {
          html += `<br><span style="color:var(--error)">${data.errors.length} errors</span>`;
        }
        result.innerHTML = html;
        showToast(`Imported ${data.items_added} items`, 'ok');
      } catch (e) {
        result.style.display = '';
        result.innerHTML = `<span style="color:var(--error)">Import failed: ${escHtml(e.message)}</span>`;
        showToast(`Import failed: ${e.message}`, 'error');
      } finally {
        progress.style.display = 'none';
      }
    }

    /* ── Stats ── */
    const SOURCE_COLORS = {
      linkedin: 'var(--src-linkedin)',
      bluesky: 'var(--src-bluesky)',
      youtube: 'var(--src-youtube)',
      arxiv: 'var(--src-arxiv)',
      microblog: 'var(--src-microblog)',
    };

    async function loadStats() {
      try {
        const data = await api('/api/stats');
        const cards = document.getElementById('stats-cards');
        cards.innerHTML = `
          <div class="stat-card">
            <div class="stat-value">${data.total_items.toLocaleString()}</div>
            <div class="stat-label">Total items</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${data.own_content.toLocaleString()}</div>
            <div class="stat-label">Own content</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${Object.keys(data.sources).length}</div>
            <div class="stat-label">Sources active</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${data.date_range.earliest ? new Date(data.date_range.earliest).toLocaleDateString() : '-'}</div>
            <div class="stat-label">Earliest item</div>
          </div>
        `;

        const chart = document.getElementById('stats-chart');
        const entries = Object.entries(data.sources);
        if (entries.length === 0) {
          chart.innerHTML = '<div class="empty-state">No items to chart</div>';
          return;
        }
        const max = Math.max(...entries.map(([,v]) => v));
        chart.innerHTML = entries.map(([name, count]) => {
          const pct = max > 0 ? (count / max * 100) : 0;
          const color = SOURCE_COLORS[name] || 'var(--muted)';
          return `
            <div class="bar-row">
              <span class="bar-label">${escHtml(name)}</span>
              <div class="bar-track">
                <div class="bar-fill" style="width:${pct}%;background:${color}">${count}</div>
              </div>
            </div>
          `;
        }).join('');
      } catch (e) {
        showToast(`Failed to load stats: ${e.message}`, 'error');
      }
    }

    /* ── Populate source filter ── */
    async function populateSourceFilter() {
      try {
        const sources = await api('/api/sources');
        const sel = document.getElementById('feed-source');
        sources.forEach(s => {
          const opt = document.createElement('option');
          opt.value = s.name;
          opt.textContent = s.name;
          sel.appendChild(opt);
        });
      } catch {}
    }

    /* ── Skeleton loading ── */
    function renderSkeletons(count) {
      let html = '';
      for (let i = 0; i < count; i++) {
        html += `<div class="skeleton-card">
          <div class="skeleton-line short"></div>
          <div class="skeleton-line medium"></div>
          <div class="skeleton-line short"></div>
        </div>`;
      }
      return html;
    }

    /* ── Health check ── */
    let wasDisconnected = false;

    async function checkHealth() {
      const dot = document.getElementById('dot');
      const banner = document.getElementById('disconnect-banner');
      try {
        await api('/api/health');
        dot.className = 'dot ok';
        dot.title = 'Connected';
        banner.classList.remove('visible');
        if (wasDisconnected) {
          showToast('Reconnected to server', 'ok');
          wasDisconnected = false;
        }
      } catch {
        dot.className = 'dot error';
        dot.title = 'Disconnected';
        banner.classList.add('visible');
        wasDisconnected = true;
      }
    }

    /* ── Keyboard shortcuts ── */
    document.addEventListener('keydown', e => {
      if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
        e.preventDefault();
        document.querySelectorAll('#tabs button')[1].click();
      }
      if (e.key === 'Escape') {
        closeSettings();
      }
    });

    /* ── Reconnect ── */
    async function reconnect() {
      showToast('Reconnecting...', '');
      await checkHealth();
      populateSourceFilter();
      loadFeed();
    }

    /* ── Init ── */
    document.getElementById('settings-btn').addEventListener('click', openSettings);
    renderDebugInfo();
    // Wait for health check before loading data (Android WebView may not be ready immediately)
    checkHealth().then(() => {
      populateSourceFilter();
      loadFeed();
    });
    setInterval(checkHealth, 30000);
  </script>
</body>
</html>
