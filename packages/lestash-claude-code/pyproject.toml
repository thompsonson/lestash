[project]
name = "lestash-claude-code"
version = "1.48.2"
description = "Claude Code session source plugin for Le Stash"
requires-python = ">=3.12"
dependencies = [
    "lestash",
]

[project.entry-points."lestash.sources"]
claude-code = "lestash_claude_code:ClaudeCodeSource"

[tool.uv.sources]
lestash = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lestash_claude_code"]
