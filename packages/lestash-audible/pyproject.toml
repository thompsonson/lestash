[project]
name = "lestash-audible"
version = "1.48.0"
description = "Audible source plugin for Le Stash"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "lestash",
    "audible>=0.10.0",
]

[project.entry-points."lestash.sources"]
audible = "lestash_audible:AudibleSource"

[tool.uv.sources]
lestash = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lestash_audible"]

[tool.pytest.ini_options]
testpaths = ["tests"]
