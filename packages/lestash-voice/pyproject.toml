[project]
name = "lestash-voice"
version = "1.25.2"
description = "Voice note transcription plugin for Le Stash"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "lestash",
    "faster-whisper>=1.0.0",
]

[project.entry-points."lestash.sources"]
voice = "lestash_voice:VoiceSource"

[tool.uv.sources]
lestash = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lestash_voice"]
