name: Android Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get install -y --no-install-recommends cmake libclang-dev 2>/dev/null \
            || (sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake libclang-dev)

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Cache Android NDK
        uses: actions/cache@v5
        with:
          path: /usr/local/lib/android/sdk/ndk/27.2.12479018
          key: ndk-27.2.12479018

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.2.12479018"

      - name: Set NDK environment
        run: |
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Install npm dependencies
        run: npm ci
        working-directory: app

      - name: Inject build version
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.1.0-dev.$(date -u +%Y%m%d.%H%M)"
          fi
          VERSION_CODE=$(( $(date -u +%s) / 60 ))
          jq --arg v "$VERSION" '.version = $v' app/src-tauri/tauri.conf.json > tmp.json && mv tmp.json app/src-tauri/tauri.conf.json
          echo "TAURI_ANDROID_VERSION_CODE=${VERSION_CODE}" >> "$GITHUB_ENV"
          echo "DEV_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "App version: ${VERSION}, versionCode: ${VERSION_CODE}"

      - name: Copy custom Android icons
        run: |
          RES_DIR=app/src-tauri/gen/android/app/src/main/res
          cp -r app/src-tauri/icons/android/* "$RES_DIR/"
          echo "Copied icons to $RES_DIR"
          ls -la "$RES_DIR"/mipmap-*/ic_launcher*.png

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > /tmp/lestash-release.jks

      - name: Build APK
        run: npx tauri android build --target aarch64 --target x86_64
        working-directory: app

      - name: Sign APK
        run: |
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -1)
          unsigned=$(find app/src-tauri/gen/android -name '*-unsigned.apk' | head -1)
          signed="${unsigned%-unsigned.apk}.apk"
          "$APKSIGNER" sign --ks /tmp/lestash-release.jks --ks-pass pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }} --out "$signed" "$unsigned"
          "$APKSIGNER" verify "$signed"

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: lestash-android
          path: app/src-tauri/gen/android/app/build/outputs/apk/**/*-release.apk
          if-no-files-found: error

      - name: Upload to tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/src-tauri/gen/android/app/build/outputs/apk/**/*-release.apk

      - name: Delete old dev release
        if: github.ref == 'refs/heads/main'
        run: |
          OLD_TAG=$(gh release list --json tagName -q '[.[].tagName | select(test("^v0\\.1\\.0-dev\\."))] | map(select(endswith("-desktop") | not))[0] // empty')
          if [ -n "$OLD_TAG" ]; then
            echo "Deleting old dev release: $OLD_TAG"
            gh release delete "$OLD_TAG" --yes --cleanup-tag
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create dev release
        if: github.ref == 'refs/heads/main'
        run: |
          DEV_TAG="v${{ env.DEV_VERSION }}"
          gh release create "$DEV_TAG" \
            --title "Dev Build — ${DEV_TAG} (${{ env.SHORT_SHA }})" \
            --prerelease \
            --notes "$(cat <<EOF
          Rolling development build from \`main\`.
          Updated on every push — install via [Obtainium](https://obtainium.imranr.dev/).

          **Version:** \`${{ env.DEV_VERSION }}\`
          **Commit:** [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          EOF
          )" \
            app/src-tauri/gen/android/app/build/outputs/apk/universal/release/*-release.apk
          gh release edit "$DEV_TAG" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
